<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saad Browser</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="color-scheme" content="light dark">
</head>
<body>

  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>

  <div>
    <h1 class="logo">Saad Browser</h1>
  </div>

  <h2 class="try">
    <a href="volxbrowser/index.html" rel="noopener">Try Volx Browser (Legacy Edition)</a>
  </h2>

  <form class="search-container" id="search-form" autocomplete="off">
    <select id="search-engine" aria-label="Search engine">
      <option value="google">Google</option>
      <option value="duckduckgo">DuckDuckGo</option>
      <option value="bing">Bing</option>
      <option value="brave">Brave</option>
    </select>
    <input type="text" id="search-input" placeholder="Search the web or enter a URL...">
    <button id="search-button" type="submit">Search</button>
  </form>

<div class="tabs">
  <button class="tab-button" data-url="https://www.google.com">
    <img src="https://www.google.com/favicon.ico" alt="Google"> Google
  </button>
  <button class="tab-button" data-url="https://www.youtube.com">
    <img src="img/icon.ico" width="32px" alt="YouTube"> YouTube
  </button>
  <button class="tab-button" data-url="https://github.com">
    <img src="https://github.githubassets.com/favicons/favicon.png" alt="GitHub"> GitHub
  </button>
  <button class="tab-button" data-url="https://www.wikipedia.org">
    <img src="https://www.wikipedia.org/static/favicon/wikipedia.ico" width="32px" alt="Wikipedia"> Wikipedia
  </button>
  <button class="tab-button" data-url="https://www.w3schools.com/">
    <img src="img/W3Schools.webp" width="32px" alt="W3Schools"> W3Schools
  </button>
  <button class="tab-button" data-url="https://www.programiz.com/">
    <img src="img/Programiz.webp" width="32px" alt="Programiz"> Programiz
  </button>
  <button class="tab-button" data-url="https://translate.google.com/">
    <img src="img/translate.webp" width="32px" alt="Google Translate"> Google Translate
  </button>
</div>

<div>
  <h3 id="tabswindows">تم إضافة التبويبات في تحديث سطح المكتب الجديد !!!</h3>
</div>
  <button class="tab-button" id="downloadbutton" data-url="https://saadthelegend1.itch.io/saad-browser">
    <img src="img/itch.webp" width="32px" alt="itch"> Itch io
  </button>


  <h3 class="more">More...</h3>

  <!-- Privacy: the tweet widget calls platform.twitter.com and ad pixels.
       Don't load it unless the user explicitly asks. -->
  <div class="social-embed">
    <button id="load-tweet" class="tab-button" type="button">
      Load tweet from @0xdonzDev (loads twitter.com)
    </button>
    <div id="tweet-container" hidden></div>
  </div>

  <div class="footer">
    <p>© 2025 STACKS the NULLS. All rights reserved.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
